appId: com.nexusresearch.app
productName: NexusResearch
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - templates/**/*
win:
  target: nsis
  icon: build/icon.ico
mac:
  target: dmg
  icon: build/icon.icns
  category: public.app-category.education
linux:
  target: AppImage
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
